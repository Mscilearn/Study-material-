<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Spot | Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        body { transition: background 0.3s; -webkit-tap-highlight-color: transparent; }
        .dark body { background-color: #050507; color: white; }
        .light body { background-color: #F8FAFC; color: #0f172a; }
        @keyframes rotate-border { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .magic-box { position: relative; overflow: hidden; z-index: 1; padding: 2.5px; background: transparent; transition: transform 0.3s ease; }
        .magic-box::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, #FFD700, transparent 30%, #6366f1, transparent 70%, #ff00ff, transparent); animation: rotate-border 4s linear infinite; z-index: -2; }
        .magic-box::after { content: ""; position: absolute; inset: 2.5px; background: var(--bg-color); z-index: -1; transition: background 0.3s ease; }
        .dark .magic-box { --bg-color: #101014; }
        .light .magic-box { --bg-color: #ffffff; }
        .shape-pill { border-radius: 9999px; } .shape-pill::after { border-radius: 9999px; }
        .shape-card { border-radius: 24px; } .shape-card::after { border-radius: 21.5px; }
    </style>
</head>
<body class="min-h-screen pb-10 font-sans">
    <nav class="fixed w-full z-50 top-0 left-0 px-4 py-4">
        <div class="magic-box shape-pill shadow-2xl mx-auto max-w-4xl w-full">
            <div class="px-6 py-2.5 flex justify-between items-center bg-white/0 relative z-10 backdrop-blur-xl">
                <a href="#" class="flex items-center gap-2">
                    <i class="ph-fill ph-robot text-3xl text-brand dark:text-gold"></i>
                    <span class="font-black text-xl tracking-tight dark:text-white">Prime <span class="text-brand dark:text-gold">SpoT</span></span>
                </a>
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-white/10 text-xl dark:text-white hover:text-gold transition-colors">
                    <i id="themeIcon" class="ph-bold ph-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-32 px-4 max-w-4xl mx-auto flex flex-col gap-6">
        <div class="magic-box shape-card aspect-video w-full">
            <div class="w-full h-full relative z-10 bg-black rounded-[21.5px] overflow-hidden flex items-center justify-center">
                <iframe id="vPlayer" class="hidden w-full h-full" allowfullscreen></iframe>
                <i id="loader" class="ph-bold ph-spinner-gap animate-spin text-4xl text-gray-600"></i>
            </div>
        </div>
        <div class="flex flex-col gap-4">
            <a href="#" id="dlBtn" class="magic-box shape-pill text-center"><div class="py-4 relative z-10 font-bold text-lg text-emerald-500 uppercase tracking-widest bg-emerald-500/10 rounded-full">Direct Download</div></a>
            <a href="#" id="tgBtn" class="magic-box shape-pill text-center"><div class="py-4 relative z-10 font-bold text-lg text-blue-500 uppercase tracking-widest bg-blue-500/10 rounded-full">Get File In Telegram</div></a>
        </div>
    </main>

    <script>
        // Theme & Config
        const html = document.documentElement;
        function toggleTheme() {
            html.classList.toggle('dark');
            document.getElementById('themeIcon').className = html.classList.contains('dark') ? 'ph-bold ph-sun' : 'ph-bold ph-moon';
        }

        // Firebase Setup (Vercel env variables ko config mein paste karein)
        const firebaseConfig = { apiKey: "API_KEY", projectId: "PROJ_ID", appId: "APP_ID" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const slug = new URLSearchParams(window.location.search).get('id');
        if(slug) {
            db.collection("videos").doc(slug).get().then(doc => {
                if(doc.exists) {
                    const d = doc.data();
                    const vp = document.getElementById('vPlayer');
                    vp.src = d.iframeUrl; vp.classList.remove('hidden');
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dlBtn').href = d.downloadUrl;
                    document.getElementById('tgBtn').href = d.telegramUrl;
                }
            });
        }
    </script>
</body>
</html>
