<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Manage All</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050507] text-white p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">Video <span class="text-brand">History</span></h1>
            <a href="admin.html" class="bg-white/5 px-4 py-2 rounded-lg text-sm border border-white/10">Back to Admin</a>
        </div>
        <div id="list" class="grid gap-4">
            </div>
    </div>

    <script>
        const firebaseConfig = { /* Paste Config Here */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if(!user) window.location.href = 'admin.html';
            loadData();
        });

        function loadData() {
            db.collection("videos").orderBy("title", "asc").onSnapshot(snap => {
                const list = document.getElementById('list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-[#101014] p-4 rounded-2xl border border-white/10 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-lg">${d.title}</h3>
                                <p class="text-xs text-gray-500">ID: ${doc.id}</p>
                            </div>
                            <button onclick="deleteDoc('${doc.id}')" class="bg-red-500/10 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                                <i class="ph ph-trash"></i> Delete
                            </button>
                        </div>
                    `;
                });
            });
        }

        function deleteDoc(id) {
            if(confirm("Are you sure?")) db.collection("videos").doc(id).delete();
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</body>
</html>
