<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Msci Learn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ADD THE SAME MAGIC CARD CSS AS ABOVE FOR PREMIUM FEEL */
        body { background: #050507; color: white; font-family: 'Urbanist', sans-serif; }
    </style>
</head>
<body class="p-6">

    <div id="loginPanel" class="max-w-md mx-auto mt-20 bg-[#101014] p-8 rounded-3xl border border-white/10 shadow-2xl">
        <h2 class="text-3xl font-black mb-6 text-center">Secure <span class="text-brand">Login</span></h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Secret Token" class="w-full p-4 mb-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-brand">
        <button onclick="login()" class="w-full py-4 bg-brand rounded-xl font-bold hover:bg-indigo-600 transition">Access Control Panel</button>
    </div>

    <div id="dashPanel" class="hidden max-w-2xl mx-auto mt-10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-brand">Add New Video</h2>
            <div class="flex gap-4">
                <a href="history.html" class="px-4 py-2 border border-white/10 rounded-lg text-sm hover:bg-white/5">View History</a>
                <button onclick="logout()" class="px-4 py-2 bg-red-500/10 text-red-500 rounded-lg text-sm font-bold">Logout</button>
            </div>
        </div>

        <form id="addForm" class="bg-[#101014] p-8 rounded-3xl border border-white/10 shadow-2xl grid gap-5">
            <input type="text" id="slug" placeholder="Slug / ID (e.g., msci_vid1)" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
            <input type="text" id="title" placeholder="Video Title" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
            <input type="url" id="iframe" placeholder="Iframe Embed URL" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
            <input type="url" id="dl" placeholder="Direct Download URL" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
            <input type="url" id="tg" placeholder="Telegram URL" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none">
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-brand to-purple-600 rounded-xl font-bold uppercase tracking-widest mt-2">Publish Video</button>
        </form>
    </div>

    <script>
        // Check session
        if(sessionStorage.getItem("admin_token")) {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('dashPanel').classList.remove('hidden');
        }

        function login() {
            // For simplicity, directly saving token entered. 
            // In reality, you'd send this to /api/auth to verify first.
            const token = document.getElementById('adminPass').value;
            sessionStorage.setItem("admin_token", token);
            window.location.reload();
        }

        function logout() {
            sessionStorage.clear();
            window.location.reload();
        }

        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "Processing...";
            
            const payload = {
                id: document.getElementById('slug').value,
                title: document.getElementById('title').value,
                iframeUrl: document.getElementById('iframe').value,
                downloadUrl: document.getElementById('dl').value,
                telegramUrl: document.getElementById('tg').value
            };

            try {
                // CALL VERCEL API WITH ADMIN TOKEN
                const res = await fetch('/api/video?action=add_video', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': sessionStorage.getItem("admin_token") 
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if(data.success) { alert("Video Added!"); e.target.reset(); } 
                else { alert("Error: " + data.error); }
            } catch(err) { alert("Network Error!"); }
            finally { btn.innerText = "Publish Video"; }
        };
    </script>
</body>
</html>
