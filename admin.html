<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050507] text-white min-h-screen flex items-center justify-center font-sans p-6">

    <div id="loginSection" class="w-full max-w-md bg-[#101014] p-8 rounded-3xl border border-white/10">
        <h2 class="text-3xl font-black mb-6 text-center text-gold">Admin <span class="text-white">Login</span></h2>
        <input type="email" id="email" placeholder="Admin Email" class="w-full p-4 mb-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-brand">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-brand">
        <button onclick="login()" id="loginBtn" class="w-full p-4 bg-gradient-to-r from-brand to-purple-600 font-bold rounded-xl active:scale-95 transition-transform">Enter Dashboard</button>
    </div>

    <div id="dashSection" class="hidden w-full max-w-2xl bg-[#101014] p-8 rounded-3xl border border-white/10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-brand">Add New Entry</h2>
            <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-500">Logout</button>
        </div>
        <form id="addForm" class="grid gap-4">
            <input type="text" id="slug" placeholder="Slug (e.g. video123)" class="p-4 bg-white/5 border border-white/10 rounded-xl" required>
            <input type="text" id="title" placeholder="Video Title" class="p-4 bg-white/5 border border-white/10 rounded-xl" required>
            <input type="url" id="iframe" placeholder="Iframe Embed URL" class="p-4 bg-white/5 border border-white/10 rounded-xl" required>
            <input type="url" id="dl" placeholder="Download URL" class="p-4 bg-white/5 border border-white/10 rounded-xl" required>
            <input type="url" id="tg" placeholder="Telegram URL" class="p-4 bg-white/5 border border-white/10 rounded-xl" required>
            <button type="submit" class="p-4 bg-gold text-black font-black rounded-xl">Save Video</button>
            <a href="history.html" class="text-center text-brand font-bold mt-2">View History →</a>
        </form>
    </div>

    <script>
        const firebaseConfig = { /* Paste Config Here */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
            .catch(e => alert(e.message));
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden');
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashSection').classList.add('hidden');
            }
        });

        document.getElementById('addForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('slug').value;
            db.collection("videos").doc(id).set({
                title: document.getElementById('title').value,
                iframeUrl: document.getElementById('iframe').value,
                downloadUrl: document.getElementById('dl').value,
                telegramUrl: document.getElementById('tg').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("Saved!"));
        };

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
